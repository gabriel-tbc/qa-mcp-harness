# Target: the local qa-toolkit-mcp server, spawned over stdio.
#
# The harness launches this command as a subprocess and speaks MCP over its
# stdin/stdout. Note the command points at the *server's own* venv python —
# the harness venv and the server venv are independent.
#
# To test a different MCP, copy this file, change the fields, and set
# HARNESS_TARGET to the new filename (without .toml).

name = "qa-toolkit-local"
transport = "stdio"

[stdio]
command = 'C:\Dev\building\mcp\qa-toolkit-mcp\.venv\Scripts\python.exe'
args = ["-m", "qa_toolkit_mcp.server"]

[stdio.env]
QA_TOOLKIT_RUNS_DIR = 'C:\Dev\building\mcp\qa-toolkit-mcp\runs'
